name: 🔄 Pull Request Validation

on:
  pull_request:
    branches: [ main, develop ]
    types: [opened, synchronize, reopened, ready_for_review]

# Cancelar ejecuciones previas del mismo PR
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================
  # Job 1: Quick Validation
  # ============================================
  quick-validation:
    name: ⚡ Quick Validation
    runs-on: ubuntu-latest

    # Skip draft PRs
    if: github.event.pull_request.draft == false

    steps:
    - name: 📥 Checkout PR code
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.pull_request.head.sha }}
        fetch-depth: 0

    - name: 🔧 Setup .NET 9.0.x
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x

    - name: 📦 Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-pr-nuget-${{ hashFiles('**/*.csproj') }}
        restore-keys: |
          ${{ runner.os }}-pr-nuget-
          ${{ runner.os }}-nuget-

    # Restore rápido
    - name: 📥 Restore dependencies
      run: dotnet restore --verbosity minimal

    # Build rápido
    - name: 🏗️ Build solution
      run: dotnet build --no-restore --configuration Debug --verbosity minimal

    # Pruebas esenciales
    - name: 🧪 Run essential tests
      run: |
        dotnet test tests/StayHub.UnitTests/StayHub.UnitTests.csproj \
          --no-build \
          --configuration Debug \
          --verbosity minimal \
          --logger "console;verbosity=normal"

  # ============================================
  # Job 2: Code Quality Check
  # ============================================
  code-quality-check:
    name: 🔍 Code Quality
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false

    steps:
    - name: 📥 Checkout PR code
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.pull_request.head.sha }}

    - name: 🔧 Setup .NET 9.0.x
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x

    - name: 📥 Restore dependencies
      run: dotnet restore --verbosity minimal

    - name: 🏗️ Build for analysis
      run: dotnet build --no-restore --configuration Debug

    # Verificar formato de código
    - name: 🎨 Check code formatting
      run: |
        echo "🎨 Checking code formatting..."
        dotnet format --verify-no-changes --verbosity diagnostic
      continue-on-error: true

    # Análisis de código básico
    - name: 🔍 Basic code analysis
      run: |
        echo "🔍 Running basic code analysis..."
        # Verificar warnings como errores en modo Debug
        dotnet build --configuration Debug --verbosity normal | tee build.log

        # Contar warnings
        WARNING_COUNT=$(grep -c "warning" build.log || echo "0")
        echo "⚠️ Warnings found: $WARNING_COUNT"

        if [ "$WARNING_COUNT" -gt 10 ]; then
          echo "❌ Too many warnings ($WARNING_COUNT). Please fix before merging."
          exit 1
        fi
      continue-on-error: true

  # ============================================
  # Job 3: PR Summary
  # ============================================
  pr-summary:
    name: 📋 PR Summary
    runs-on: ubuntu-latest
    needs: [quick-validation, code-quality-check]
    if: always() && github.event.pull_request.draft == false

    steps:
    - name: 📋 Generate PR summary
      run: |
        echo "# 🔄 Pull Request Validation Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## 📊 Validation Status" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Check | Status | Description |" >> $GITHUB_STEP_SUMMARY
        echo "|-------|--------|-------------|" >> $GITHUB_STEP_SUMMARY
        echo "| ⚡ Quick Validation | ${{ needs.quick-validation.result == 'success' && '✅ Passed' || '❌ Failed' }} | Build and essential tests |" >> $GITHUB_STEP_SUMMARY
        echo "| 🔍 Code Quality | ${{ needs.code-quality-check.result == 'success' && '✅ Passed' || '⚠️ Issues' }} | Formatting and analysis |" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        if [[ "${{ needs.quick-validation.result }}" == "success" ]]; then
          echo "## ✅ Ready for Review!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "This PR has passed all essential validations:" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Solution builds successfully" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Unit tests are passing" >> $GITHUB_STEP_SUMMARY
          echo "- 🔍 Code quality checks completed" >> $GITHUB_STEP_SUMMARY
        else
          echo "## ❌ Issues Found" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "This PR has issues that need to be addressed:" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ needs.quick-validation.result }}" != "success" ]]; then
            echo "- ❌ Build or test failures detected" >> $GITHUB_STEP_SUMMARY
          fi
          if [[ "${{ needs.code-quality-check.result }}" != "success" ]]; then
            echo "- ⚠️ Code quality issues detected" >> $GITHUB_STEP_SUMMARY
          fi
        fi

        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## 📈 PR Information" >> $GITHUB_STEP_SUMMARY
        echo "- **PR:** #${{ github.event.pull_request.number }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Title:** ${{ github.event.pull_request.title }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Author:** @${{ github.event.pull_request.user.login }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Source:** \`${{ github.event.pull_request.head.ref }}\`" >> $GITHUB_STEP_SUMMARY
        echo "- **Target:** \`${{ github.event.pull_request.base.ref }}\`" >> $GITHUB_STEP_SUMMARY

  # ============================================
  # Job 4: Draft PR Message
  # ============================================
  draft-pr-message:
    name: 📝 Draft PR Notice
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == true

    steps:
    - name: 📝 Draft notice
      run: |
        echo "# 📝 Draft Pull Request" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "This is a **draft PR** - validations will run when marked as ready for review." >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## 🚀 When ready:" >> $GITHUB_STEP_SUMMARY
        echo "1. Mark as **Ready for Review**" >> $GITHUB_STEP_SUMMARY
        echo "2. Automatic validations will run" >> $GITHUB_STEP_SUMMARY
        echo "3. Request reviews from team members" >> $GITHUB_STEP_SUMMARY