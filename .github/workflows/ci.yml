name: 🔧 Continuous Integration

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # ============================================
  # Job 1: Build and Test
  # ============================================
  test:
    name: 🧪 Build & Test
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        dotnet-version: ['9.0.x']

    steps:
    # Checkout del código
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # Setup de .NET 9
    - name: 🔧 Setup .NET ${{ matrix.dotnet-version }}
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ matrix.dotnet-version }}

    # Cache de paquetes NuGet
    - name: 📦 Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
        restore-keys: |
          ${{ runner.os }}-nuget-

    # Restore de dependencias
    - name: 📥 Restore dependencies
      run: dotnet restore

    # Build del proyecto
    - name: 🏗️ Build solution
      run: dotnet build --no-restore --configuration Release

    # Ejecución de pruebas unitarias con cobertura
    - name: 🧪 Run unit tests
      run: |
        dotnet test tests/StayHub.UnitTests/StayHub.UnitTests.csproj --no-build --configuration Release --verbosity normal --collect:"XPlat Code Coverage" --results-directory ./coverage --logger "trx;LogFileName=test-results.trx"

    # Upload de resultados de pruebas (solo en Ubuntu para evitar duplicados)
    - name: 📊 Upload test results
      if: matrix.os == 'ubuntu-latest'
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: ./coverage/test-results.trx
      # Continuar aunque falle el upload
      continue-on-error: true

    # Upload de cobertura de código (solo en Ubuntu)
    - name: 📈 Upload coverage reports
      if: matrix.os == 'ubuntu-latest'
      uses: actions/upload-artifact@v4
      with:
        name: coverage-reports
        path: ./coverage/**/coverage.cobertura.xml
      continue-on-error: true

  # ============================================
  # Job 2: Code Quality Analysis
  # ============================================
  code-quality:
    name: 🔍 Code Quality
    runs-on: ubuntu-latest
    needs: test

    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: 🔧 Setup .NET 9.0.x
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x

    # Restore y build para análisis
    - name: 📥 Restore dependencies
      run: dotnet restore

    - name: 🏗️ Build for analysis
      run: dotnet build --no-restore --configuration Release

    # Análisis de código estático (opcional pero recomendado)
    - name: 🔍 Run code analysis
      run: |
        echo "🔍 Running static code analysis..."
        dotnet format --verify-no-changes --verbosity diagnostic || echo "⚠️ Code formatting issues detected"
      continue-on-error: true

  # ============================================
  # Job 3: Security Scan
  # ============================================
  security:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    needs: test

    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 🔧 Setup .NET 9.0.x
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x

    # Escaneo de vulnerabilidades en paquetes NuGet
    - name: 🔒 Security audit
      run: |
        dotnet restore
        dotnet list package --vulnerable --include-transitive || echo "⚠️ Vulnerable packages detected"
      continue-on-error: true

  # ============================================
  # Job 4: Build Summary
  # ============================================
  build-summary:
    name: 📋 Build Summary
    runs-on: ubuntu-latest
    needs: [test, code-quality, security]
    if: always()

    steps:
    - name: 📋 Generate build summary
      run: |
        echo "## 🎯 Build Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
        echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
        echo "| 🧪 Tests | ${{ needs.test.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
        echo "| 🔍 Code Quality | ${{ needs.code-quality.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
        echo "| 🔒 Security | ${{ needs.security.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 📊 Test Coverage" >> $GITHUB_STEP_SUMMARY
        echo "Coverage reports available in build artifacts." >> $GITHUB_STEP_SUMMARY
