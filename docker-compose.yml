# ============================================
# Docker Compose para StayHub Manager
# ============================================
version: '3.8'

services:
  # ============================================
  # API Principal
  # ============================================
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stayhub-api
    ports:
      - "${API_PORT:-8080}:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=db;Database=StayHubDb;User Id=sa;Password=${DB_PASSWORD:-YourStrong@Passw0rd};TrustServerCertificate=True;
    depends_on:
      db:
        condition: service_healthy
    networks:
      - stayhub-network
    restart: unless-stopped

  # ============================================
  # SQL Server
  # ============================================
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: stayhub-db
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${DB_PASSWORD:-YourStrong@Passw0rd}
      - MSSQL_PID=Express
    ports:
      - "${DB_PORT:-1433}:1433"
    volumes:
      - db-data:/var/opt/mssql
      - ./scripts/init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "${DB_PASSWORD:-YourStrong@Passw0rd}" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - stayhub-network
    restart: unless-stopped

networks:
  stayhub-network:
    driver: bridge

volumes:
  db-data:
